<!-- Splash Screen -->
<div class="splash-screen min-h-screen flex items-center justify-center bg-primary" style="background: #C8102E;">
    <div class="text-center text-white p-8">
        <!-- Logo -->
        <div class="w-24 h-24 mx-auto mb-6 bg-white rounded-2xl flex items-center justify-center shadow-lg">
            <img src="assets/logo.svg" alt="AEON" class="w-16 h-16" />
        </div>
        
        <!-- Title -->
        <h1 class="text-2xl font-bold tracking-wider">AEON Mobile Tools</h1>
        <p class="text-white/70 text-sm mt-1">Version 1.0.0</p>
        
        <!-- Loading Animation -->
        <div class="mt-8 flex flex-col items-center gap-3">
            <div class="spinner border-white/30 border-t-white"></div>
            <p class="text-white/80 text-sm" id="splash-status">Loading...</p>
        </div>
    </div>
</div>

<script type="module">
    // Splash screen controller
    const statusMessages = [
        { text: 'Checking Configuration...', delay: 500 },
        { text: 'Checking Local Database...', delay: 1000 },
        { text: 'Loading Interface...', delay: 1500 }
    ];
    
    const statusElement = document.getElementById('splash-status');
    let currentIndex = 0;
    
    // Update status messages
    function updateStatus() {
        if (currentIndex < statusMessages.length) {
            statusElement.textContent = statusMessages[currentIndex].text;
            currentIndex++;
            setTimeout(updateStatus, 500);
        }
    }
    
    // Start status updates
    updateStatus();
    
    // Navigate to login after 2 seconds
    setTimeout(() => {
        window.router?.navigate('/login');
    }, 2500);
</script>
